org.gradle.parallel=true
org.gradle.caching=true

# KGP 2.0.x POM dependency rewriting calls a Gradle API removed in Gradle 9
# (getDependencyProject) and breaks generatePomFile in modules with a project()
# dependency. The rewrite is only meaningful for multiplatform target suffixes,
# which this JVM-only build has none of — keep deps intact instead.
kotlin.mpp.keepMppDependenciesIntactInPoms=true
