services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: ch-demo
    ports:
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: demo
      CLICKHOUSE_PASSWORD: demo
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
